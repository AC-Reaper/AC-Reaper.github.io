# ============================================================================
#  Hugo 配置文件 — Eric's Blog
#  框架: Hugo + PaperMod
#  双语: 中文（默认）/ English
# ============================================================================

baseURL = "https://AC-Reaper.github.io/"
title = "Eric's Blog"

# 默认语言为中文，访问根路径直接是中文版
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true                  # 中日韩字符的 summary / 字数统计修正

theme = "PaperMod"

enableRobotsTXT = true
buildDrafts  = false
buildFuture  = false
buildExpired = false

pagination.pagerSize = 10

# 让 Hugo 把图片/PDF 等静态资源原样输出
[markup]
  [markup.goldmark.renderer]
    unsafe = true                       # 允许 Markdown 里写 HTML
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true
    guessSyntax = true

[minify]
  disableXML = true
  minifyOutput = true

# ============================================================================
#  多语言
# ============================================================================
[languages]
  [languages.zh]
    languageName = "中文"
    languageCode = "zh-CN"
    contentDir   = "content/zh"
    weight       = 1
    title        = "Eric's Blog"
    [languages.zh.params]
      description = "Eric 的个人博客 · 不定期分享生活与技术"
      # 关掉 profileMode，改用 homeInfoMode（首页会自动列出最新文章）
      [languages.zh.params.profileMode]
        enabled = false
      [languages.zh.params.homeInfoParams]
        Title = "👋 Hi, 我是 Eric"
        Content = """
<div class="home-intro">
  <img src="/img/avatar.svg" alt="Eric" class="home-avatar" />
  <p class="home-tagline">这里是我不定期分享生活与技术的小角落。<br/>
  最近的胡思乱想、踩到的坑、读到的书，都丢在这里。</p>
</div>
"""

    [languages.zh.menu]
      [[languages.zh.menu.main]]
        identifier = "posts"
        name = "文章"
        url  = "/posts/"
        weight = 10
      [[languages.zh.menu.main]]
        identifier = "archives"
        name = "归档"
        url  = "/archives/"
        weight = 20
      [[languages.zh.menu.main]]
        identifier = "tags"
        name = "标签"
        url  = "/tags/"
        weight = 30
      [[languages.zh.menu.main]]
        identifier = "about"
        name = "关于"
        url  = "/about/"
        weight = 40
      [[languages.zh.menu.main]]
        identifier = "search"
        name = "搜索"
        url  = "/search/"
        weight = 50

  [languages.en]
    languageName = "English"
    languageCode = "en-US"
    contentDir   = "content/en"
    weight       = 2
    title        = "Eric's Blog"
    [languages.en.params]
      description = "Eric's personal blog — occasional notes on life and tech."
      [languages.en.params.profileMode]
        enabled = false
      [languages.en.params.homeInfoParams]
        Title = "👋 Hi, I'm Eric"
        Content = """
<div class="home-intro">
  <img src="/img/avatar.svg" alt="Eric" class="home-avatar" />
  <p class="home-tagline">A small corner where I jot down notes on life and tech.<br/>
  Random thoughts, sharp edges, books I'm reading — all ending up here.</p>
</div>
"""

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url  = "/en/posts/"
        weight = 10
      [[languages.en.menu.main]]
        identifier = "archives"
        name = "Archives"
        url  = "/en/archives/"
        weight = 20
      [[languages.en.menu.main]]
        identifier = "tags"
        name = "Tags"
        url  = "/en/tags/"
        weight = 30
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url  = "/en/about/"
        weight = 40
      [[languages.en.menu.main]]
        identifier = "search"
        name = "Search"
        url  = "/en/search/"
        weight = 50

# ============================================================================
#  PaperMod 主题参数
# ============================================================================
[params]
  env = "production"
  author = "Eric"
  defaultTheme = "auto"             # auto / light / dark
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true
  comments = false
  hideMeta = false
  hideSummary = false

  # 注意：homeInfoParams 已经定义在每个语言下，这里全局兜底不会被覆盖

  # 社交图标 - 你可以按需开关
  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/AC-Reaper"
  [[params.socialIcons]]
    name = "email"
    url  = "mailto:Noblewomantrinaio78160@zohomail.com"
  [[params.socialIcons]]
    name = "rss"
    url  = "/index.xml"

  [params.assets]
    disableHLJS = true
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon.svg"
    favicon32x32 = "/favicon.svg"
    apple_touch_icon = "/favicon.svg"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 输出格式：让首页/分类页/标签页支持 JSON（搜索功能要用）
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 自定义分类
[taxonomies]
  category = "categories"
  tag      = "tags"
  series   = "series"

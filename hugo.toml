# ============================================================================
#  Hugo 配置文件 — Eric's Blog
#  框架: Hugo + PaperMod
#  双语: 中文（默认）/ English
# ============================================================================

baseURL = "https://AC-Reaper.github.io/"
title = "Eric's Blog"

# 默认语言为中文，访问根路径直接是中文版
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true                  # 中日韩字符的 summary / 字数统计修正

theme = "PaperMod"

enableRobotsTXT = true
buildDrafts  = false
buildFuture  = false
buildExpired = false

pagination.pagerSize = 10

# 让 Hugo 把图片/PDF 等静态资源原样输出
[markup]
  [markup.goldmark.renderer]
    unsafe = true                       # 允许 Markdown 里写 HTML
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true
    guessSyntax = true

[minify]
  disableXML = true
  minifyOutput = true

# ============================================================================
#  多语言
# ============================================================================
[languages]
  [languages.zh]
    languageName = "中文"
    languageCode = "zh-CN"
    contentDir   = "content/zh"
    weight       = 1
    title        = "Eric's Blog"
    [languages.zh.params]
      description = "Eric 的个人博客 · 不定期分享生活与技术"
      [languages.zh.params.profileMode]
        enabled = true
        title   = "Hi, 我是 Eric 👋"
        subtitle = "这里是我不定期分享生活与技术的小角落。"
        imageUrl = ""
        imageTitle = "头像"
        imageWidth = 120
        imageHeight = 120
        [[languages.zh.params.profileMode.buttons]]
          name = "文章"
          url  = "posts/"
        [[languages.zh.params.profileMode.buttons]]
          name = "归档"
          url  = "archives/"
        [[languages.zh.params.profileMode.buttons]]
          name = "关于"
          url  = "about/"

    [languages.zh.menu]
      [[languages.zh.menu.main]]
        identifier = "posts"
        name = "文章"
        url  = "/posts/"
        weight = 10
      [[languages.zh.menu.main]]
        identifier = "archives"
        name = "归档"
        url  = "/archives/"
        weight = 20
      [[languages.zh.menu.main]]
        identifier = "tags"
        name = "标签"
        url  = "/tags/"
        weight = 30
      [[languages.zh.menu.main]]
        identifier = "about"
        name = "关于"
        url  = "/about/"
        weight = 40
      [[languages.zh.menu.main]]
        identifier = "search"
        name = "🔍"
        url  = "/search/"
        weight = 50

  [languages.en]
    languageName = "English"
    languageCode = "en-US"
    contentDir   = "content/en"
    weight       = 2
    title        = "Eric's Blog"
    [languages.en.params]
      description = "Eric's personal blog — occasional notes on life and tech."
      [languages.en.params.profileMode]
        enabled = true
        title   = "Hi, I'm Eric 👋"
        subtitle = "A small corner where I jot down notes on life and tech."
        imageUrl = ""
        imageTitle = "Avatar"
        imageWidth = 120
        imageHeight = 120
        [[languages.en.params.profileMode.buttons]]
          name = "Posts"
          url  = "posts/"
        [[languages.en.params.profileMode.buttons]]
          name = "Archives"
          url  = "archives/"
        [[languages.en.params.profileMode.buttons]]
          name = "About"
          url  = "about/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url  = "/en/posts/"
        weight = 10
      [[languages.en.menu.main]]
        identifier = "archives"
        name = "Archives"
        url  = "/en/archives/"
        weight = 20
      [[languages.en.menu.main]]
        identifier = "tags"
        name = "Tags"
        url  = "/en/tags/"
        weight = 30
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url  = "/en/about/"
        weight = 40
      [[languages.en.menu.main]]
        identifier = "search"
        name = "🔍"
        url  = "/en/search/"
        weight = 50

# ============================================================================
#  PaperMod 主题参数
# ============================================================================
[params]
  env = "production"
  author = "Eric"
  defaultTheme = "auto"             # auto / light / dark
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true
  comments = false
  hideMeta = false
  hideSummary = false

  [params.homeInfoParams]
    Title = "Eric's Blog"
    Content = "欢迎 — Welcome"

  # 社交图标 - 你可以按需开关
  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/AC-Reaper"
  [[params.socialIcons]]
    name = "email"
    url  = "mailto:Noblewomantrinaio78160@zohomail.com"
  [[params.socialIcons]]
    name = "rss"
    url  = "/index.xml"

  [params.assets]
    disableHLJS = true
    favicon = "/favicon.ico"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 输出格式：让首页/分类页/标签页支持 JSON（搜索功能要用）
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 自定义分类
[taxonomies]
  category = "categories"
  tag      = "tags"
  series   = "series"

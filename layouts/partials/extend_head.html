{{- /* ============================================================
       自定义注入到 <head>。PaperMod 自动包含本文件。
       —— Mermaid: 检测页面 pre.mermaid 节点 → 按需加载库 → 渲染
   ============================================================ */ -}}
<script>
(function () {
  function isDark() {
    return document.body.classList.contains('dark') ||
           document.documentElement.classList.contains('dark');
  }

  function runMermaid() {
    const blocks = document.querySelectorAll('pre.mermaid');
    if (!blocks.length) return;

    // 渲染前先把"原始文本"用 data-source 备份，并清空显示，避免闪烁
    blocks.forEach(el => {
      if (!el.dataset.source) {
        el.dataset.source = el.textContent.trim();
        el.textContent = '加载流程图…';
        el.style.opacity = '0.4';
      }
    });

    import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs')
      .then(async ({ default: mermaid }) => {
        mermaid.initialize({
          startOnLoad: false,
          theme: isDark() ? 'dark' : 'default',   // 用稳定的预设主题
          securityLevel: 'loose',
          fontFamily: 'Inter, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif',
          flowchart: { curve: 'basis', padding: 16, useMaxWidth: true, htmlLabels: true },
        });

        // 手动渲染每一个块（更可控，不依赖 startOnLoad）
        for (let i = 0; i < blocks.length; i++) {
          const el = blocks[i];
          try {
            const { svg } = await mermaid.render('mermaid-svg-' + i, el.dataset.source);
            el.innerHTML = svg;
            el.style.opacity = '1';
          } catch (err) {
            el.textContent = '⚠️ 流程图渲染失败：' + err.message;
            el.style.opacity = '1';
            console.error(err);
          }
        }
      })
      .catch(err => {
        blocks.forEach(el => {
          el.textContent = '⚠️ Mermaid 加载失败';
          el.style.opacity = '1';
        });
        console.error('Mermaid load failed:', err);
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runMermaid);
  } else {
    runMermaid();
  }
})();
</script>

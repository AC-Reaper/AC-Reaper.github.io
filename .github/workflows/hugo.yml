# ============================================================================
#  GitHub Actions: 构建并发布 Hugo 站点到 GitHub Pages
#  触发: 推送到 main 分支 / 手动触发
# ============================================================================
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# 只允许一个并发部署，跳过中间排队的任务
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# 默认 shell
defaults:
  run:
    shell: bash

jobs:
  # --------------------------------------------------------------------------
  #  构建
  # --------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.146.0   # PaperMod 最新版要求 ≥ 0.146.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # 备注：PaperMod 基础用法不需要 Dart Sass。
      #       如果以后改主题 SCSS，把下面这步取消注释即可。
      # - name: Install Dart Sass
      #   run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 取全部历史，方便 .GitInfo / .Lastmod
          submodules: recursive   # 万一以后改用 submodule 也兼容

      - name: Clone PaperMod theme
        run: |
          git clone --depth=1 https://github.com/adityatelange/hugo-PaperMod.git themes/PaperMod
          rm -rf themes/PaperMod/.git

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true        # Pages 没启用时自动启用，避免首次失败

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Shanghai
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # --------------------------------------------------------------------------
  #  发布
  # --------------------------------------------------------------------------
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
